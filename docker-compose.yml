services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: marketpulse-dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  localstack:
    image: localstack/localstack:latest
    container_name: marketpulse-localstack
    environment:
      - SERVICES=s3
      - EDGE_PORT=4566
      - AWS_DEFAULT_REGION=ap-south-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketpulse-backend
    env_file:
      - .env.local
    environment:
      - PYTHONPATH=/app/src
      - USE_DYNAMO=true
      - DYNAMO_ENDPOINT_URL=http://dynamodb-local:8000
      - S3_ENDPOINT_URL=http://localstack:4566
      - MOCK_BEDROCK=true
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - AWS_REGION=ap-south-1
    ports:
      - "8001:8000"
    depends_on:
      - dynamodb-local
      - localstack
    command: >
      uvicorn marketpulse.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  frontend:
    image: node:20
    container_name: marketpulse-frontend
    working_dir: /app/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  localstack_data:
